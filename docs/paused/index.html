<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お申し込みは完了していません｜AI戦略実践プロジェクト</title>
  <style>
    :root{--bg:#f8f5f0;--ink:#004455;--accent:#C75A3C;--muted:#5E7378;}
    *{box-sizing:border-box;}
    body{font-family:-apple-system,"Noto Sans JP",sans-serif;background:var(--bg);
         color:var(--ink);margin:0;min-height:100vh;display:flex;align-items:center;
         justify-content:center;padding:24px;line-height:1.85;-webkit-font-smoothing:antialiased;}
    .card{max-width:560px;width:100%;text-align:center;}
    h1{font-size:23px;font-weight:700;margin:0 0 22px;letter-spacing:.02em;line-height:1.4;}
    p{font-size:15px;margin:0 0 16px;text-align:left;}
    p.lead{text-align:center;font-size:16px;}
    .actions{margin:28px 0 6px;}
    .link{color:var(--ink);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(0,68,85,.35);}
    .link:hover{border-bottom-color:var(--ink);}
    .note{font-size:13px;color:var(--muted);margin:26px 0 0;text-align:center;}
    .note a{color:var(--accent);}
  </style>
</head>
<body>
  <div class="card">
    <h1>お申し込みは完了していません</h1>
    <p class="lead">決済手続きが中断されました。お申し込みはまだ完了していません。</p>
    <p>ご準備ができましたら、お送りしているメール内のお申し込みボタンから、いつでも再開
      いただけます。このページはそのまま閉じていただいて問題ありません。</p>
    <div class="actions">
      <a class="link" href="https://ai-strategy.antecanis.com/sessions/schedule/">日程や内容をもう一度確認する →</a>
    </div>
    <p class="note">ご不明点は運営（<a href="mailto:support@antecanis.com">support@antecanis.com</a>）まで
      お問い合わせください。</p>
  </div>
</body>
</html>
