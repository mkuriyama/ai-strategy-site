site_name: AI戦略実践プロジェクト
site_description: 事業を動かす方々のための、AI戦略実装の型を月次で作る・動かす実践の場（主催：栗山実／株式会社アンテカニス）
site_author: AI戦略実践プロジェクト
site_url: https://ai-strategy.antecanis.com/

theme:
  name: material
  language: ja
  custom_dir: overrides
  logo: assets/logo-header.png
  favicon: assets/favicon.png
  palette:
    # ライトモード
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    # ダークモード
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  font:
    text: Noto Sans JP
    code: Roboto Mono
  features:
    # 用語集ツールチップ（abbreviations）を有効化
    - content.tooltips
    - content.code.copy
    # 上部タブ＋サイドバーのポータル型ナビゲーション
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

extra_css:
  - stylesheets/extra.css

# 日本語（CJK）対応の abbreviations ツールチップを有効化する hook
hooks:
  - hooks/abbr_cjk.py

# 日本語検索対応（CJK 分割に対応）
plugins:
  - search:
      lang:
        - ja
        - en
  # 変動情報の単一ソース化（extra: のデータ／main.py のマクロを各ページで参照）
  - macros:
      module_name: main
  # スクリーンショット等をクリックで拡大
  - glightbox:
      auto_caption: false
      touchNavigation: true
  # OGP / ソーシャルカードの自動生成（SEO・共有）
  # フォント取得にネットワークを要するため、生成は CI 等でのみ有効化する。
  # ローカルビルドは `CARDS` 未設定＝無効（既定）。CI では env: CARDS: true。
  - social:
      cards: !ENV [CARDS, false]
      cards_layout_options:
        background_color: "#004455"
        color: "#ffffff"

markdown_extensions:
  # 用語集ツールチップ（*[TERM]: 定義 形式）
  - abbr
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - admonition
  - toc:
      permalink: true
      # CJK 見出しでも意味のあるアンカーを生成（Unicode保持）。
      # 既定の slugify は非ASCIIを除去し _2 等になるため上書き。
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # 全ページに用語集の定義を自動付与（ツールチップ用）
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
      auto_append:
        - includes/abbreviations.md

# ツールチップ用のインクルードと、サイズの大きい元画像はページ化・配信しない
exclude_docs: |
  includes/
  assets/antecanis_favicon.png
  assets/antecanis_logo_ss.png
  assets/antecanis_logo_white.png
  assets/profile_kuriyama_DSC2043.jpg
  assets/profile_kuriyama_DSC2043_s.jpg
  assets/profile_kuriyama_DSC2043_s2.jpg

nav:
  - ホーム: index.md
  - プロジェクトについて:
      - 背景と狙い: about/index.md
      - 設計思想: about/philosophy.md
      - 主催者プロフィール: about/profile.md
      - このプロジェクトを紹介する: about/share.md
  - セッション:
      - 進め方と持ち帰るもの: sessions/index.md
      - 月次テーマ: sessions/themes.md
      - 開催予定・次回案内: sessions/schedule.md
      - ダイジェスト:
          - 一覧: digests/index.md
          - Vol.1 第1回：人間の認知容量の解除: digests/vol-01.md
  - ガイド・用語集:
      - スタートガイド: start-guide.md
      - 用語集: glossary.md
  - 参加する:
      - 参加費と決済: join/index.md
      - 登録方法: join/register.md
      - 法人の方へ: join/corporate.md

extra:
  analytics:
    provider: google
    property: G-2H53XSH9YC

  # ────────────────────────────────────────────────────────────
  # 変動情報の単一ソース（§3）。更新は毎回このブロックだけ。
  # ホーム(overrides/home.html)・schedule・join 等が参照する。
  # ────────────────────────────────────────────────────────────
  register_url: https://mailchi.mp/antecanis/ai-strategy
  # ヘッダー／導線で使う短縮表記（直近の本編回）
  next_session_short: "6/23(火) 20:00〜"
  # 次回回の配列（ラベル／種別 main|sub／日付／補足）
  sessions:
    - label: "本編 第2回"
      kind: main
      date: "6/23(火) 20:00〜"
      note: "オンライン(Zoom)／登録後の初回は無料。パイロットを経た本編スタート。"
    - label: "追加開催 サブ回"
      kind: sub
      date: "7/10(木) 20:00〜"
      note: "第2回と同内容の追加開催。本編に都合が合わない方向け。"
  # 参加費（home のティーザー／join の正本が参照）
  pricing:
    early_label: "早期参加枠"
    early_monthly: "5,400円＋税"
    early_monthly_incl: "5,940円"
    list_monthly: "9,000円＋税"
    list_monthly_incl: "9,900円"
    early_target: "2026年6月申込対象"

