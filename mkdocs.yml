site_name: AI戦略実践プロジェクト
site_description: 事業を動かす方々のための、AI戦略実装の型を月次で作る・動かす実践の場（主催：栗山実／株式会社アンテカニス）
site_author: AI戦略実践プロジェクト
site_url: https://ai-strategy.antecanis.com/

theme:
  name: material
  language: ja
  palette:
    # ライトモード
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    # ダークモード
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    # 用語集ツールチップ（abbreviations）を有効化
    - content.tooltips
    - content.code.copy
    # 上部タブ＋サイドバーのポータル型ナビゲーション
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

# 日本語（CJK）対応の abbreviations ツールチップを有効化する hook
hooks:
  - hooks/abbr_cjk.py

# 日本語検索対応（CJK 分割に対応）
plugins:
  - search:
      lang:
        - ja
        - en

markdown_extensions:
  # 用語集ツールチップ（*[TERM]: 定義 形式）
  - abbr
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # 全ページに用語集の定義を自動付与（ツールチップ用）
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
      auto_append:
        - includes/abbreviations.md

# ツールチップ用のインクルードはページ化しない
exclude_docs: |
  includes/

nav:
  - ホーム: index.md
  - プロジェクトについて:
      - 背景と狙い: about/index.md
      - 設計思想: about/philosophy.md
      - このプロジェクトが「何でないか」: about/not.md
      - 主催者プロフィール: about/profile.md
  - セッション:
      - 進め方と持ち帰るもの: sessions/index.md
      - 月次テーマ: sessions/themes.md
      - 開催スケジュール: sessions/schedule.md
  - ダイジェスト:
      - 一覧: digests/index.md
  - リソース:
      - スタートガイド: start-guide.md
      - ボキャブラリーリスト（用語集）: glossary.md
  - 参加する:
      - 参加費と決済: join/index.md
      - 登録方法: join/register.md
      - 法人の方へ: join/corporate.md
  - お知らせ／次回開催: news/index.md

copyright: "&copy; AI戦略実践プロジェクト／株式会社アンテカニス・栗山実"
